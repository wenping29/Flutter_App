name: Build and Deploy to Aliyun
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Create a zip file of the build
        run: zip -r build.zip ./build

      - name: Upload to Aliyun OSS
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_OSS_BUCKET_NAME: ${{ secrets.ALIYUN_OSS_BUCKET_NAME }}
          ALIYUN_OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          curl -X POST "https://oss-${{ env.ALIYUN_OSS_REGION }}.aliyuncs.com/${{ env.ALIYUN_OSS_BUCKET_NAME }}/build.zip" \
            -H "Authorization: OSS ${ALIYUN_ACCESS_KEY_ID}:${ALIYUN_ACCESS_KEY_SECRET}" \
            -H "Content-Type: application/zip" \
            --data-binary @build.zip
